
services:
  app:
    build:
      context: .
      network: host
      args:
        COMMIT_ID: ${COMMIT_ID:-unknown}
    #image: gometeo:latest
    restart: always
    networks:
      - traefik
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=Europe/Paris
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-lan"
      - "traefik.http.routers.to-gometeo.ruleSyntax=v3"
      - "traefik.http.routers.to-gometeo.rule=Host(`meteo.vintz.fr`)"
      - "traefik.http.routers.to-gometeo.tls.certresolver=vintz-wildcard"
      - "traefik.http.routers.to-gometeo.tls.domains[0].main=*.vintz.fr"  
      - "traefik.http.services.gometeo.loadbalancer.server.port=1051"

networks:
  traefik:
    name: "traefik-lan"
    external: true
